<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Orders</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f4f4;
        }

        h1 {
            color: #2d8680;
        }

        .order {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        button {
            background: red;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>DAFTAR PESANAN</h1>

<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue,
    remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "API_KEY_KAMU",
    authDomain: "PROJECT_ID.firebaseapp.com",
    databaseURL: "https://PROJECT_ID-default-rtdb.firebaseio.com",
    projectId: "PROJECT_ID",
    storageBucket: "PROJECT_ID.appspot.com",
    messagingSenderId: "SENDER_ID",
    appId: "APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ordersDiv = document.getElementById('orders');

onValue(ref(db, 'orders'), (snapshot) => {

    ordersDiv.innerHTML = '';

    snapshot.forEach(child => {

        const order = child.val();
        const key = child.key;

        let itemsHTML = '';

        order.items.forEach(item => {
            itemsHTML += `
                <li>
                    ${item.name} (${item.flavor}) - Qty: ${item.quantity}
                </li>
            `;
        });

        ordersDiv.innerHTML += `
            <div class="order">
                <h3>${order.name}</h3>

                <p><strong>Kelas:</strong> ${order.studentClass}</p>
                <p><strong>WA:</strong> ${order.phone}</p>
                <p><strong>Pembayaran:</strong> ${order.payment}</p>
                <p><strong>Total:</strong> Rp ${order.total.toLocaleString('id-ID')}</p>

                <ul>
                    ${itemsHTML}
                </ul>

                <button onclick="deleteOrder('${key}')">
                    Hapus
                </button>
            </div>
        `;
    });

});

window.deleteOrder = function(key) {
    remove(ref(db, 'orders/' + key));
}

</script>

</body>
</html>
